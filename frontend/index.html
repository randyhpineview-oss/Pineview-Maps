<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Pineview Actual Data Collaboration - Site management and inspection app" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pineview" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Pineview Actual Data Collaboration</title>
    <!--
      Boot splash. Inlined so it paints on the first frame (before the
      React bundle is parsed). This covers cold-loads on slow networks
      and the initial wait while the Render free-tier backend wakes up.
      `main.jsx` calls window.__pineviewHideSplash() after React mounts;
      we fade for 300 ms and then remove the node so it never blocks
      pointer events once the app is interactive.
    -->
    <style>
      #pv-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: radial-gradient(circle at 50% 35%, #0f1d36 0%, #09111f 70%);
        color: #e5eefb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        opacity: 1;
        transition: opacity 0.3s ease;
        -webkit-tap-highlight-color: transparent;
      }
      #pv-splash.pv-splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #pv-splash .pv-splash-logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 18px 40px rgba(7, 12, 24, 0.55), 0 0 0 1px rgba(143, 182, 255, 0.12);
        animation: pv-splash-pulse 2.4s ease-in-out infinite;
      }
      #pv-splash .pv-splash-title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #e5eefb;
      }
      #pv-splash .pv-splash-sub {
        font-size: 0.78rem;
        color: #6b7fa3;
        letter-spacing: 0.02em;
      }
      #pv-splash .pv-splash-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2.5px solid rgba(143, 182, 255, 0.18);
        border-top-color: #3b82f6;
        animation: pv-splash-spin 0.9s linear infinite;
      }
      @keyframes pv-splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pv-splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @media (prefers-reduced-motion: reduce) {
        #pv-splash .pv-splash-logo { animation: none; }
        #pv-splash .pv-splash-spinner { animation-duration: 1.6s; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pv-splash" role="status" aria-live="polite" aria-label="Loading Pineview">
      <img class="pv-splash-logo" src="/icon-192.png" alt="" width="96" height="96" />
      <div class="pv-splash-title">Pineview</div>
      <div class="pv-splash-spinner" aria-hidden="true"></div>
      <div class="pv-splash-sub">Loading…</div>
    </div>
    <script>
      // Safety net: if main.jsx fails to load (e.g. extreme cold start or
      // network blip), hide the splash after 15 s so the user sees the
      // underlying error / empty state instead of an indefinite spinner.
      window.__pineviewSplashFallbackTimer = setTimeout(function () {
        var el = document.getElementById('pv-splash');
        if (el) el.classList.add('pv-splash-hidden');
      }, 15000);
      window.__pineviewHideSplash = function () {
        clearTimeout(window.__pineviewSplashFallbackTimer);
        var el = document.getElementById('pv-splash');
        if (!el) return;
        el.classList.add('pv-splash-hidden');
        setTimeout(function () { el && el.parentNode && el.parentNode.removeChild(el); }, 350);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
