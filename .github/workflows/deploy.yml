name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Create environment file
      run: |
        cd frontend
        echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || 'https://your-backend-url.com' }}" > .env
        echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> .env
        
    - name: Build
      env:
        # Manually pinned for this release. Auto-bumping with
        # `1.1.${{ github.run_number }}` would produce v1.1.10 here
        # (run_number is currently below 13), which is a REGRESSION
        # from the v1.1.12 build that already shipped — the popover
        # would appear to go backwards in time on users' phones. To
        # avoid that confusion we pin manually until we're past
        # run_number 12, then we can switch back to auto-bumping
        # `1.1.${{ github.run_number }}` and the patch number will
        # naturally keep climbing. The label is read by
        # frontend/vite.config.js -> frontend/src/version.js and shown
        # in the topbar / avatar menu so workers, office, and admins
        # can confirm what version they have loaded.
        VITE_APP_VERSION: 1.1.34
        VITE_APP_COMMIT: ${{ github.sha }}
      run: |
        cd frontend
        # Trim the commit to 7 chars for a compact display label.
        export VITE_APP_COMMIT="${VITE_APP_COMMIT:0:7}"
        npm run build
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
